<!DOCTYPE html>
<html>
<head>
  <title>Distributed Harness Cluster</title>

  <style>
    body {
      background:#0b0b0b;
      color:white;
      font-family:Arial;
      padding:30px;
    }

    #status{
      margin-top:20px;
      background:#222;
      padding:20px;
    }

    .worker{
      padding:8px;
      margin:5px;
      background:#1e1e1e;
    }
  </style>
</head>

<body>

<h1>🧠 Distributed Worker Cluster</h1>

<div id="status">
Waiting realtime data...
</div>

<script>

const ws = new WebSocket("ws://localhost:9090");

ws.onopen = () => {
  console.log("✅ Dashboard Connected");
};

ws.onerror = () => {
  console.log("❌ WS Error");
};

ws.onmessage = (event) => {

  const data = JSON.parse(event.data);

  let workerHTML = "";

  data.workers.forEach(w => {

    const color =
      w.status === "BUSY"
        ? "#3498db"
        : "#2ecc71";

    workerHTML += `
      <div class="worker"
           style="border-left:6px solid ${color}">
        👷 Worker-${w.id} — ${w.status}
      </div>
    `;
  });

  document.getElementById("status").innerHTML = `
    <h3>📊 Cluster Status</h3>

    Workers Active: ${data.workersActive}<br/>
    Busy: ${data.busy}<br/>
    Idle: ${data.idle}<br/>
    Tasks Sent: ${data.tasksSent}

    <h3>🖥 Worker Nodes</h3>
    ${workerHTML}
  `;
};

</script>

</body>
</html>
